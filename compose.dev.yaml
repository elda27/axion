
services:
  axion-server:
    build:
      context: ./axion
      dockerfile: axion_server.dockerfile
    container_name: axion-server
    ports:
      - "8000:8000"
    volumes:
      - ./axion/src/axion:/app/src/axion
      - ./axion/src/axion_server:/app/src/axion_server
      - ./axion/pyproject.toml:/app/pyproject.toml:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://axion:axion_dev_password@postgres:5432/axion
      - S3_ENDPOINT_URL=http://rustfs:9000
      - S3_ACCESS_KEY_ID=rustfsadmin
      - S3_SECRET_ACCESS_KEY=rustfsadmin
    command: ["uv", "run", "uvicorn", "axion_server.apps.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-setup:
        condition: service_completed_successfully

  axion-alembic:
    build:
      context: ./axion
      dockerfile: axion_alembic.dockerfile
    container_name: axion-alembic
    volumes:
      - ./axion/src/axion:/app/src/axion
      - ./axion/src/axion_server:/app/src/axion_server
      - ./axion/src/axion_alembic:/app/src/axion_alembic
      - ./axion/alembic.ini:/app/alembic.ini:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://axion:axion_dev_password@postgres:5432/axion
    depends_on:
      postgres:
        condition: service_healthy

  axion-ui:
    build:
      context: .
      dockerfile: axion_ui/axion_ui.dockerfile
    container_name: axion-ui
    ports:
      - "6006:6006"
    volumes:
      - ./axion_ui:/app/axion_ui
      - /app/node_modules
      - /app/axion_ui/node_modules
    command: ["pnpm", "storybook", "--host", "0.0.0.0"]

  axion-frontend:
    build:
      context: .
      dockerfile: axion_ui/axion_ui.dockerfile
    container_name: axion-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./axion_ui:/app/axion_ui
      - /app/node_modules
      - /app/axion_ui/node_modules
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    depends_on:
      - axion-server

  postgres:
    image: postgres:16-alpine
    container_name: axion-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-axion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axion_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-axion}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axion -d axion"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: axion-rustfs
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "${RUSTFS_API_PORT:-9010}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9011}:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs-setup:
    image: amazon/aws-cli:latest
    container_name: axion-rustfs-setup
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url http://rustfs:9000 s3 mb s3://axion-artifacts --region us-east-1 || true;
        aws --endpoint-url http://rustfs:9000 s3 mb s3://axion-archives --region us-east-1 || true;
        exit 0;
      "

volumes:
  postgres_data:
  rustfs_data:
