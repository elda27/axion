
services:
  axion-server:
    build:
      context: ./axion
      dockerfile: axion_server.dockerfile
    container_name: axion-server
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://axion:axion_dev_password@postgres:5432/axion
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

  axion-frontend:
    build:
      context: ./axion_ui
      dockerfile: axion_ui.dockerfile
      args:
        - BUILD_MODE=production
    container_name: axion-frontend
    ports:
      - "5173:5173"
    command: ["pnpm", "preview", "--host", "0.0.0.0", "--port", "5173"]
    depends_on:
      - axion-server

  postgres:
    image: postgres:16
    container_name: axion-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-axion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axion_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-axion}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axion -d axion"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: axion-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: axion-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/axion-artifacts --ignore-existing;
        mc mb local/axion-archives --ignore-existing;
        exit 0;
      "

volumes:
  postgres_data:
  minio_data:
