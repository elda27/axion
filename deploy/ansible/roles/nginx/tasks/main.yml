---
# Nginx role - Install and configure nginx

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Create nginx configuration for Axion
  ansible.builtin.template:
    src: axion.conf.j2
    dest: /etc/nginx/sites-available/axion
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable Axion nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/axion
    dest: /etc/nginx/sites-enabled/axion
    state: link
  notify: Reload nginx

- name: Test nginx configuration
  ansible.builtin.command:
    cmd: nginx -t
  register: nginx_test
  changed_when: false

- name: Ensure nginx is started and enabled
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: yes
