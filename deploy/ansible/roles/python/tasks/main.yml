---
# Python role - Install Python and uv package manager

- name: Add deadsnakes PPA for Python {{ python_version }}
  ansible.builtin.apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
  when: ansible_distribution == "Ubuntu"

- name: Install Python {{ python_version }}
  ansible.builtin.apt:
    name:
      - "python{{ python_version }}"
      - "python{{ python_version }}-venv"
      - "python{{ python_version }}-dev"
    state: present
    update_cache: yes

- name: Check if uv is installed
  ansible.builtin.stat:
    path: /home/{{ app_user }}/.local/bin/uv
  register: uv_installed

- name: Download and install uv
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: /home/{{ app_user }}/.local/bin/uv
  become: yes
  become_user: "{{ app_user }}"
  when: not uv_installed.stat.exists

- name: Add uv to PATH in .bashrc
  ansible.builtin.lineinfile:
    path: /home/{{ app_user }}/.bashrc
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
  become: yes
  become_user: "{{ app_user }}"

- name: Verify uv installation
  ansible.builtin.command:
    cmd: /home/{{ app_user }}/.local/bin/uv --version
  become: yes
  become_user: "{{ app_user }}"
  register: uv_version_output
  changed_when: false

- name: Display uv version
  ansible.builtin.debug:
    msg: "uv version: {{ uv_version_output.stdout }}"
