---
# Axion role - Setup Axion backend application

- name: Create environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0600"
  notify: Restart axion-backend

- name: Create Axion backend systemd service
  ansible.builtin.template:
    src: axion-backend.service.j2
    dest: /etc/systemd/system/axion-backend.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart axion-backend

- name: Enable Axion backend service
  ansible.builtin.systemd:
    name: axion-backend
    enabled: yes
    daemon_reload: yes

- name: Create logrotate configuration for Axion
  ansible.builtin.template:
    src: logrotate.j2
    dest: /etc/logrotate.d/axion
    owner: root
    group: root
    mode: "0644"
