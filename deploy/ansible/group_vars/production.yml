---
# Production environment variables

environment: production

# Cloud SQL
cloud_sql_instance: "{{ lookup('env', 'CLOUD_SQL_INSTANCE') }}"

# Database
db_user: "{{ lookup('env', 'DB_USER') | default('axion_lab', true) }}"
db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
db_name: "{{ lookup('env', 'DB_NAME') | default('axion_lab', true) }}"
database_url: "postgresql+asyncpg://{{ db_user }}:{{ db_password }}@localhost:{{ cloud_sql_proxy_port }}/{{ db_name }}"

# GCS
gcs_project_id: "{{ lookup('env', 'GCP_PROJECT_ID') }}"
gcs_bucket: "{{ lookup('env', 'GCS_BUCKET') | default('axion-lab-artifacts', true) }}"

# Application settings
app_debug: false
object_store_provider: gcs

# SSL (optional - set to true if using Let's Encrypt)
ssl_enabled: false
ssl_domain: ""
