---
# Common variables for all hosts

# Application
app_name: axion
app_user: axion
app_group: axion

# Directories
app_dir: /opt/axion
ui_dir: /var/www/axion-ui
log_dir: /var/log/axion

# Python
python_version: "3.12"
uv_version: "latest"

# Node.js
node_version: "22"
pnpm_version: "10"

# Cloud SQL Proxy
cloud_sql_proxy_version: "2.8.2"
cloud_sql_proxy_port: 5432

# Backend
backend_host: "127.0.0.1"
backend_port: 8000

# Nginx
nginx_server_name: "_"
nginx_client_max_body_size: "100M"

# System packages
system_packages:
  - nginx
  - python3.12
  - python3.12-venv
  - python3-pip
  - git
  - curl
  - wget
  - unzip
  - htop
  - vim
  - jq
