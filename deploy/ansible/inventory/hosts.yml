---
all:
  children:
    gcp:
      children:
        production:
          hosts:
            axion-lab-prod:
              ansible_host: "{{ lookup('env', 'AXION_LAB_PROD_HOST') | default('10.0.0.2', true) }}"
        staging:
          hosts:
            axion-lab-staging:
              ansible_host: "{{ lookup('env', 'AXION_LAB_STAGING_HOST') | default('10.0.0.3', true) }}"
      vars:
        ansible_user: "{{ lookup('env', 'ANSIBLE_SSH_USER') | default('ubuntu', true) }}"
        ansible_ssh_private_key_file: "{{ lookup('env', 'ANSIBLE_SSH_KEY') | default('~/.ssh/id_rsa', true) }}"
        ansible_python_interpreter: /usr/bin/python3

    local:
      hosts:
        localhost:
          ansible_connection: local
