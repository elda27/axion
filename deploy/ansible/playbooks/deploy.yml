---
# Deployment playbook for Axion application

- name: Deploy Axion Application
  hosts: "{{ target_hosts | default('gcp') }}"
  become: yes

  vars:
    backend_archive: "{{ lookup('env', 'BACKEND_ARCHIVE') | default('axion-backend.tar.gz', true) }}"
    frontend_archive: "{{ lookup('env', 'FRONTEND_ARCHIVE') | default('axion-frontend.tar.gz', true) }}"
    run_migrations: true
    backup_current: true

  pre_tasks:
    - name: Validate deployment artifacts exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: artifact_check
      delegate_to: localhost
      become: no
      loop:
        - "{{ backend_archive }}"
        - "{{ frontend_archive }}"
      failed_when: not artifact_check.stat.exists
      tags: [always]

  tasks:
    - name: Create backup of current deployment
      block:
        - name: Check if current deployment exists
          ansible.builtin.stat:
            path: "{{ app_dir }}/pyproject.toml"
          register: current_deployment

        - name: Backup current deployment
          ansible.builtin.copy:
            src: "{{ app_dir }}/"
            dest: "/opt/axion-backup/"
            remote_src: yes
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
          when: current_deployment.stat.exists
      when: backup_current
      tags: [backup]

    - name: Deploy Backend
      block:
        - name: Create temporary directory for backend extraction
          ansible.builtin.tempfile:
            state: directory
            prefix: axion_backend_
          register: backend_temp_dir

        - name: Copy backend archive to server
          ansible.builtin.copy:
            src: "{{ backend_archive }}"
            dest: "{{ backend_temp_dir.path }}/backend.tar.gz"
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0644"

        - name: Extract backend archive
          ansible.builtin.unarchive:
            src: "{{ backend_temp_dir.path }}/backend.tar.gz"
            dest: "{{ app_dir }}"
            remote_src: yes
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            extra_opts:
              - --strip-components=1

        - name: Setup Python virtual environment
          ansible.builtin.shell: |
            ~/.local/bin/uv venv .venv --python={{ python_version }}
            ~/.local/bin/uv sync --frozen --no-dev
          args:
            chdir: "{{ app_dir }}"
          become: yes
          become_user: "{{ app_user }}"

        - name: Cleanup backend temp directory
          ansible.builtin.file:
            path: "{{ backend_temp_dir.path }}"
            state: absent
      tags: [backend, deploy]

    - name: Deploy Frontend
      block:
        - name: Clear existing frontend files
          ansible.builtin.file:
            path: "{{ ui_dir }}"
            state: absent

        - name: Create frontend directory
          ansible.builtin.file:
            path: "{{ ui_dir }}"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0755"

        - name: Copy frontend archive to server
          ansible.builtin.copy:
            src: "{{ frontend_archive }}"
            dest: "/tmp/frontend.tar.gz"
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0644"

        - name: Extract frontend archive
          ansible.builtin.unarchive:
            src: /tmp/frontend.tar.gz
            dest: "{{ ui_dir }}"
            remote_src: yes
            owner: "{{ app_user }}"
            group: "{{ app_group }}"

        - name: Cleanup frontend archive
          ansible.builtin.file:
            path: /tmp/frontend.tar.gz
            state: absent
      tags: [frontend, deploy]

    - name: Run Database Migrations
      ansible.builtin.shell: |
        source .venv/bin/activate
        alembic upgrade head
      args:
        chdir: "{{ app_dir }}"
        executable: /bin/bash
      become: yes
      become_user: "{{ app_user }}"
      environment:
        DATABASE_URL: "{{ database_url }}"
      when: run_migrations
      tags: [migrations, database]

    - name: Restart Services
      block:
        - name: Restart axion-backend service
          ansible.builtin.systemd:
            name: axion-backend
            state: restarted
            daemon_reload: yes

        - name: Reload nginx
          ansible.builtin.systemd:
            name: nginx
            state: reloaded
      tags: [restart, services]

    - name: Health Check
      block:
        - name: Wait for backend to be ready
          ansible.builtin.wait_for:
            port: "{{ backend_port }}"
            host: "{{ backend_host }}"
            delay: 5
            timeout: 60

        - name: Perform health check
          ansible.builtin.uri:
            url: "http://localhost/health"
            method: GET
            status_code: 200
          register: health_check
          retries: 5
          delay: 3
          until: health_check.status == 200

        - name: Display health check result
          ansible.builtin.debug:
            msg: "Health check passed! Application is running."
      tags: [health, verify]

  post_tasks:
    - name: Display deployment completion message
      ansible.builtin.debug:
        msg: |
          ================================================
          Axion Deployment Complete!
          ================================================
          
          Host: {{ inventory_hostname }}
          Backend: http://{{ backend_host }}:{{ backend_port }}
          Frontend: http://{{ ansible_host }}
          
          Services status:
          - Run: sudo systemctl status axion-backend
          - Run: sudo systemctl status nginx
          
          Logs:
          - Backend: {{ log_dir }}/axion-backend.log
          - Nginx: {{ log_dir }}/nginx_access.log
          ================================================
      tags: [always]

  handlers:
    - name: Rollback deployment
      block:
        - name: Check if backup exists
          ansible.builtin.stat:
            path: /opt/axion-backup
          register: backup_exists

        - name: Restore from backup
          ansible.builtin.copy:
            src: /opt/axion-backup/
            dest: "{{ app_dir }}/"
            remote_src: yes
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
          when: backup_exists.stat.exists

        - name: Restart services after rollback
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: restarted
          loop:
            - axion-backend
            - nginx
          when: backup_exists.stat.exists
