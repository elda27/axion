
services:
  axion-lab-server:
    build:
      context: ./axion_lab
      dockerfile: axion_lab_server.dockerfile
    container_name: axion-lab-server
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://axion_lab:axion_lab_dev_password@postgres:5432/axion_lab
      - S3_ENDPOINT_URL=http://rustfs:9000
      - S3_ACCESS_KEY_ID=rustfsadmin
      - S3_SECRET_ACCESS_KEY=rustfsadmin
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-setup:
        condition: service_completed_successfully

  axion-lab-frontend:
    build:
      context: .
      dockerfile: axion_lab_ui/axion_lab_ui.dockerfile
      args:
        - BUILD_MODE=production
    container_name: axion-lab-frontend
    ports:
      - "5173:5173"
    command: ["pnpm", "preview", "--host", "0.0.0.0", "--port", "5173"]
    depends_on:
      - axion-lab-server

  postgres:
    image: postgres:16
    container_name: axion-lab-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-axion_lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axion_lab_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-axion_lab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axion_lab -d axion_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: axion-lab-rustfs
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs-setup:
    image: amazon/aws-cli:latest
    container_name: axion-lab-rustfs-setup
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url http://rustfs:9000 s3 mb s3://axion-lab-artifacts --region us-east-1 || true;
        aws --endpoint-url http://rustfs:9000 s3 mb s3://axion-lab-archives --region us-east-1 || true;
        exit 0;
      "

volumes:
  postgres_data:
  rustfs_data:
