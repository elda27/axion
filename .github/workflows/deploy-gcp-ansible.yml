name: Deploy to GCP (Ansible)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      playbook:
        description: 'Playbook to run'
        required: true
        default: 'deploy'
        type: choice
        options:
          - setup
          - deploy
          - rollback
      tags:
        description: 'Ansible tags (comma-separated, leave empty for all)'
        required: false
        type: string
      ci_run_id:
        description: 'CI workflow run ID (use artifacts from CI instead of building)'
        required: false
        type: string

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
  GCE_INSTANCE: ${{ vars.GCE_INSTANCE || 'axion-vm' }}
  GCE_ZONE: ${{ vars.GCE_ZONE || 'asia-northeast1-a' }}
  CLOUD_SQL_INSTANCE: ${{ secrets.CLOUD_SQL_INSTANCE }}
  GCS_BUCKET: ${{ vars.GCS_BUCKET || 'axion-artifacts' }}
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'

jobs:
  # Build artifacts (only for deploy playbook, skip if using CI artifacts)
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    if: inputs.playbook == 'deploy' && inputs.ci_run_id == ''
    outputs:
      backend_artifact: ${{ steps.upload-backend.outputs.artifact-id }}
      frontend_artifact: ${{ steps.upload-frontend.outputs.artifact-id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Build Backend
        run: |
          mkdir -p dist/backend
          cp -r src/axion src/axion_server src/axion_alembic dist/backend/
          cp pyproject.toml uv.lock alembic.ini dist/backend/
          cp -r deploy dist/backend/
          cd dist && tar -czf axion-backend.tar.gz backend/

      - name: Build Frontend
        working-directory: src/axion_ui
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package Frontend
        run: |
          mkdir -p dist
          cd src/axion_ui/dist && tar -czf ../../../dist/axion-frontend.tar.gz .

      - name: Upload Backend Artifact
        id: upload-backend
        uses: actions/upload-artifact@v4
        with:
          name: axion-backend
          path: dist/axion-backend.tar.gz
          retention-days: 1

      - name: Upload Frontend Artifact
        id: upload-frontend
        uses: actions/upload-artifact@v4
        with:
          name: axion-frontend
          path: dist/axion-frontend.tar.gz
          retention-days: 1

  # Run Ansible playbook
  ansible:
    name: Run Ansible Playbook
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment:
      name: ${{ inputs.environment }}
      url: https://${{ vars.APP_DOMAIN }}
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Get VM IP Address
        id: vm-ip
        run: |
          VM_IP=$(gcloud compute instances describe ${{ env.GCE_INSTANCE }} \
            --zone=${{ env.GCE_ZONE }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "ip=$VM_IP" >> $GITHUB_OUTPUT

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ steps.vm-ip.outputs.ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Install Ansible Galaxy collections
        run: |
          cd deploy/ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Download artifacts (deploy only)
        if: inputs.playbook == 'deploy'
        uses: actions/download-artifact@v4
        with:
          path: dist/
          run-id: ${{ inputs.ci_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dynamic inventory
        run: |
          cat > deploy/ansible/inventory/dynamic.yml << EOF
          all:
            children:
              ${{ inputs.environment }}:
                hosts:
                  axion-${{ inputs.environment }}:
                    ansible_host: ${{ steps.vm-ip.outputs.ip }}
                    ansible_user: ${{ secrets.SSH_USER || 'ubuntu' }}
                    ansible_ssh_private_key_file: ~/.ssh/id_rsa
                    ansible_python_interpreter: /usr/bin/python3
          EOF

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          CLOUD_SQL_INSTANCE: ${{ secrets.CLOUD_SQL_INSTANCE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          BACKEND_ARCHIVE: ${{ github.workspace }}/dist/axion-backend/axion-backend.tar.gz
          FRONTEND_ARCHIVE: ${{ github.workspace }}/dist/axion-frontend/axion-frontend.tar.gz
        run: |
          cd deploy/ansible
          
          TAGS_OPT=""
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS_OPT="--tags ${{ inputs.tags }}"
          fi
          
          ansible-playbook \
            -i inventory/dynamic.yml \
            playbooks/${{ inputs.playbook }}.yml \
            -l ${{ inputs.environment }} \
            $TAGS_OPT \
            -v

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Ansible Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Playbook | ${{ inputs.playbook }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | ${{ inputs.tags || 'all' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VM IP | ${{ steps.vm-ip.outputs.ip }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
