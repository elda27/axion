name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: axion_lab
        run: |
          uv sync --frozen --all-extras

      - name: Run linting
        working-directory: axion_lab
        run: |
          uv run ruff check src/

      - name: Run type checking
        working-directory: axion_lab
        run: |
          uv run ty check src/

      - name: Run tests
        working-directory: axion_lab
        run: |
          uv run pytest tests/ -v --cov=src

  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: test
    outputs:
      backend_artifact: ${{ steps.upload-backend.outputs.artifact-id }}
      frontend_artifact: ${{ steps.upload-frontend.outputs.artifact-id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        working-directory: axion_lab_ui
        run: |
          pnpm install --frozen-lockfile

      - name: Build Backend
        run: |
          mkdir -p dist/backend
          cp -r axion_lab/src/axion_lab axion_lab/src/axion_lab_server axion_lab/src/axion_lab_alembic dist/backend/
          cp axion_lab/pyproject.toml axion_lab/uv.lock axion_lab/alembic.ini dist/backend/
          cp -r deploy dist/backend/
          cd dist && tar -czf axion-lab-backend.tar.gz backend/

      - name: Build Frontend
        working-directory: axion_lab_ui
        run: |
          pnpm build

      - name: Build Storybook
        if: github.ref == 'refs/heads/main'
        working-directory: axion_lab_ui
        run: |
          pnpm build-storybook

      - name: Package Frontend
        run: |
          mkdir -p dist
          cd axion_lab_ui/dist && tar -czf ../../dist/axion-lab-frontend.tar.gz .

      - name: Package Storybook
        if: github.ref == 'refs/heads/develop'
        run: |
          mkdir -p dist
          cd axion_lab_ui/storybook-static && tar -czf ../../dist/axion-lab-storybook.tar.gz .

      - name: Upload Backend Artifact
        id: upload-backend
        uses: actions/upload-artifact@v4
        with:
          name: axion-lab-backend
          path: dist/axion-lab-backend.tar.gz
          retention-days: 7

      - name: Upload Frontend Artifact
        id: upload-frontend
        uses: actions/upload-artifact@v4
        with:
          name: axion-lab-frontend
          path: dist/axion-lab-frontend.tar.gz
          retention-days: 7

      - name: Upload Storybook Artifact
        if: github.ref == 'refs/heads/develop'
        id: upload-storybook
        uses: actions/upload-artifact@v4
        with:
          name: axion-lab-storybook
          path: dist/axion-lab-storybook.tar.gz
          retention-days: 7

  # Trigger deployment workflow on success (main/develop only)
  trigger-deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      actions: write
    steps:
      - name: Trigger deploy workflow
        uses: actions/github-script@v7
        with:
          script: |
            const environment = context.ref === 'refs/heads/main' ? 'production' : 'staging';
            const deployStorybook = context.ref === 'refs/heads/develop';
            
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-gcp.yml',
              ref: context.ref,
              inputs: {
                environment: environment,
                deploy_storybook: String(deployStorybook),
                ci_run_id: String(context.runId)
              }
            });
            
            console.log(`Triggered deployment to ${environment}`);
