name: Deploy to GCP

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      deploy_storybook:
        description: 'Deploy Storybook (staging only)'
        required: false
        default: true
        type: boolean

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
  GCE_INSTANCE: ${{ vars.GCE_INSTANCE || 'axion-vm' }}
  GCE_ZONE: ${{ vars.GCE_ZONE || 'asia-northeast1-a' }}
  CLOUD_SQL_INSTANCE: ${{ secrets.CLOUD_SQL_INSTANCE }}
  GCS_BUCKET: ${{ vars.GCS_BUCKET || 'axion-artifacts' }}
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  # Run tests before deployment
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras

      - name: Run linting
        run: |
          uv run ruff check src/

      - name: Run type checking
        run: |
          uv run mypy src/

      - name: Run tests
        run: |
          uv run pytest tests/ -v --cov=src

  # Build and package applications
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: test
    outputs:
      backend_artifact: ${{ steps.upload-backend.outputs.artifact-id }}
      frontend_artifact: ${{ steps.upload-frontend.outputs.artifact-id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install frontend dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build Backend
        run: |
          # Create backend package
          mkdir -p dist/backend
          cp -r src/axion src/axion_server src/axion_alembic dist/backend/
          cp pyproject.toml uv.lock alembic.ini dist/backend/
          cp -r deploy dist/backend/
          cd dist && tar -czf axion-backend.tar.gz backend/

      - name: Build Frontend
        working-directory: src/axion_ui
        run: |
          pnpm build

      - name: Build Storybook
        if: inputs.environment == 'staging' || github.ref == 'refs/heads/develop'
        working-directory: src/axion_ui
        run: |
          pnpm build-storybook

      - name: Package Frontend
        run: |
          mkdir -p dist
          cd src/axion_ui/dist && tar -czf ../../../dist/axion-frontend.tar.gz .

      - name: Package Storybook
        if: inputs.environment == 'staging' || github.ref == 'refs/heads/develop'
        run: |
          mkdir -p dist
          cd src/axion_ui/storybook-static && tar -czf ../../../dist/axion-storybook.tar.gz .

      - name: Upload Backend Artifact
        id: upload-backend
        uses: actions/upload-artifact@v4
        with:
          name: axion-backend
          path: dist/axion-backend.tar.gz
          retention-days: 7

      - name: Upload Frontend Artifact
        id: upload-frontend
        uses: actions/upload-artifact@v4
        with:
          name: axion-frontend
          path: dist/axion-frontend.tar.gz
          retention-days: 7

      - name: Upload Storybook Artifact
        if: inputs.environment == 'staging' || github.ref == 'refs/heads/develop'
        id: upload-storybook
        uses: actions/upload-artifact@v4
        with:
          name: axion-storybook
          path: dist/axion-storybook.tar.gz
          retention-days: 7

  # Deploy to GCP
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: build
    environment: 
      name: ${{ inputs.environment || 'production' }}
      url: https://${{ vars.APP_DOMAIN }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: axion-backend
          path: dist/

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: axion-frontend
          path: dist/

      - name: Download Storybook Artifact
        if: inputs.environment == 'staging' || github.ref == 'refs/heads/develop'
        uses: actions/download-artifact@v4
        with:
          name: axion-storybook
          path: dist/

      - name: Upload artifacts to GCS (staging)
        run: |
          gsutil cp dist/axion-backend.tar.gz gs://${{ env.GCS_BUCKET }}-deploy/releases/${{ github.sha }}/
          gsutil cp dist/axion-frontend.tar.gz gs://${{ env.GCS_BUCKET }}-deploy/releases/${{ github.sha }}/
          if [ -f dist/axion-storybook.tar.gz ]; then
            gsutil cp dist/axion-storybook.tar.gz gs://${{ env.GCS_BUCKET }}-deploy/releases/${{ github.sha }}/
          fi

      - name: Create environment file
        run: |
          cat > dist/.env << EOF
          APP_NAME=Axion
          DEBUG=false
          DATABASE_URL=postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@localhost:5432/${{ secrets.DB_NAME }}
          DATABASE_TYPE=postgresql
          OBJECT_STORE_PROVIDER=gcs
          OBJECT_STORE_BUCKET=${{ env.GCS_BUCKET }}
          GCS_PROJECT_ID=${{ env.GCP_PROJECT_ID }}
          API_PREFIX=/v1
          EOF
          gsutil cp dist/.env gs://${{ env.GCS_BUCKET }}-deploy/releases/${{ github.sha }}/

      - name: Deploy to VM via SSH
        run: |
          # Get VM external IP
          VM_IP=$(gcloud compute instances describe ${{ env.GCE_INSTANCE }} \
            --zone=${{ env.GCE_ZONE }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')

          # Create deployment script
          cat > /tmp/remote-deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e
          
          RELEASE_DIR="/opt/axion"
          UI_DIR="/var/www/axion-ui"
          STORYBOOK_DIR="/var/www/axion-storybook"
          RELEASE_SHA="${RELEASE_SHA}"
          GCS_BUCKET="${GCS_BUCKET}"
          DEPLOY_STORYBOOK="${DEPLOY_STORYBOOK}"
          
          echo "=== Downloading release artifacts ==="
          cd /tmp
          gsutil cp gs://${GCS_BUCKET}-deploy/releases/${RELEASE_SHA}/axion-backend.tar.gz .
          gsutil cp gs://${GCS_BUCKET}-deploy/releases/${RELEASE_SHA}/axion-frontend.tar.gz .
          gsutil cp gs://${GCS_BUCKET}-deploy/releases/${RELEASE_SHA}/.env .
          if [ "${DEPLOY_STORYBOOK}" = "true" ]; then
            gsutil cp gs://${GCS_BUCKET}-deploy/releases/${RELEASE_SHA}/axion-storybook.tar.gz . || echo "No storybook artifact found"
          fi
          
          echo "=== Extracting backend ==="
          sudo rm -rf ${RELEASE_DIR}/*
          sudo tar -xzf axion-backend.tar.gz -C ${RELEASE_DIR} --strip-components=1
          sudo cp .env ${RELEASE_DIR}/.env
          sudo chown -R axion:axion ${RELEASE_DIR}
          
          echo "=== Extracting frontend ==="
          sudo rm -rf ${UI_DIR}/*
          sudo tar -xzf axion-frontend.tar.gz -C ${UI_DIR}
          sudo chown -R axion:axion ${UI_DIR}
          
          if [ "${DEPLOY_STORYBOOK}" = "true" ] && [ -f axion-storybook.tar.gz ]; then
            echo "=== Extracting Storybook ==="
            sudo rm -rf ${STORYBOOK_DIR}/*
            sudo tar -xzf axion-storybook.tar.gz -C ${STORYBOOK_DIR}
            sudo chown -R axion:axion ${STORYBOOK_DIR}
          fi
          
          echo "=== Setting up Python environment ==="
          cd ${RELEASE_DIR}
          sudo -u axion ~/.local/bin/uv venv .venv --python=3.12
          sudo -u axion ~/.local/bin/uv sync --frozen --no-dev
          
          echo "=== Running database migrations ==="
          sudo -u axion bash -c "source .venv/bin/activate && alembic upgrade head"
          
          echo "=== Configuring nginx ==="
          if [ "${DEPLOY_STORYBOOK}" = "true" ]; then
            sudo cp ${RELEASE_DIR}/deploy/gcp/nginx-dev.conf /etc/nginx/sites-available/axion
          else
            sudo cp ${RELEASE_DIR}/deploy/gcp/nginx.conf /etc/nginx/sites-available/axion
          fi
          sudo ln -sf /etc/nginx/sites-available/axion /etc/nginx/sites-enabled/axion
          sudo nginx -t
          
          echo "=== Restarting services ===" 
          sudo systemctl restart axion-backend
          sudo systemctl restart nginx
          
          echo "=== Health check ==="
          sleep 5
          for i in {1..10}; do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                  echo "Health check passed!"
                  if [ "${DEPLOY_STORYBOOK}" = "true" ]; then
                    echo "Storybook available at port 6006"
                  fi
                  exit 0
              fi
              echo "Waiting for service... ($i/10)"
              sleep 3
          done
          echo "Health check failed!"
          exit 1
          DEPLOY_SCRIPT

          # Determine if we should deploy storybook
          DEPLOY_STORYBOOK="false"
          if [ "${{ inputs.environment }}" = "staging" ] || [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            DEPLOY_STORYBOOK="true"
          fi

          # Execute deployment via gcloud compute ssh
          gcloud compute ssh ${{ env.GCE_INSTANCE }} \
            --zone=${{ env.GCE_ZONE }} \
            --command="RELEASE_SHA=${{ github.sha }} GCS_BUCKET=${{ env.GCS_BUCKET }} DEPLOY_STORYBOOK=${DEPLOY_STORYBOOK} bash -s" \
            < /tmp/remote-deploy.sh

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "Release: ${{ github.sha }}"
            echo "Environment: ${{ inputs.environment || 'production' }}"
          else
            echo "❌ Deployment failed!"
          fi

  # Rollback job (manual trigger)
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && failure()
    needs: deploy
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Rollback to previous version
        run: |
          gcloud compute ssh ${{ env.GCE_INSTANCE }} \
            --zone=${{ env.GCE_ZONE }} \
            --command="
              if [ -d /opt/axion-backup ]; then
                sudo rm -rf /opt/axion
                sudo mv /opt/axion-backup /opt/axion
                sudo systemctl restart axion-backend
                sudo systemctl restart nginx
                echo 'Rollback completed'
              else
                echo 'No backup found for rollback'
                exit 1
              fi
            "
